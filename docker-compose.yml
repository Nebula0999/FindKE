version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: findke_db
    environment:
      POSTGRES_DB: findke_db
      POSTGRES_USER: findke_user
      POSTGRES_PASSWORD: findke_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U findke_user -d findke_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Celery and Channels
  redis:
    image: redis:7-alpine
    container_name: findke_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Web Application
  web:
    build:
      context: ./FindKE
      dockerfile: ../Dockerfile
    container_name: findke_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 FindKE.asgi:application"
    volumes:
      - ./FindKE:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=FindKE.settings.development
      - SECRET_KEY=your-secret-key-change-this-in-production
      - PGHOST=db
      - PGDATABASE=findke_db
      - PGUSER=findke_user
      - PGPASSWORD=findke_password
      - PGPORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Worker
  celery:
    build:
      context: ./FindKE
      dockerfile: ../Dockerfile
    container_name: findke_celery
    command: celery -A FindKE worker --loglevel=info
    volumes:
      - ./FindKE:/app
    environment:
      - DJANGO_SETTINGS_MODULE=FindKE.settings.development
      - SECRET_KEY=your-secret-key-change-this-in-production
      - PGHOST=db
      - PGDATABASE=findke_db
      - PGUSER=findke_user
      - PGPASSWORD=findke_password
      - PGPORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis

  # Celery Beat (for scheduled tasks)
  celery-beat:
    build:
      context: ./FindKE
      dockerfile: ../Dockerfile
    container_name: findke_celery_beat
    command: celery -A FindKE beat --loglevel=info
    volumes:
      - ./FindKE:/app
    environment:
      - DJANGO_SETTINGS_MODULE=FindKE.settings.development
      - SECRET_KEY=your-secret-key-change-this-in-production
      - PGHOST=db
      - PGDATABASE=findke_db
      - PGUSER=findke_user
      - PGPASSWORD=findke_password
      - PGPORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  static_volume:
  media_volume:
